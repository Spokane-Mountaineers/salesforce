<template>
  <section class="tk">
    <header class="tk__head">
      <p class="eyebrow">Support</p>
      <h1 class="title">My Tickets</h1>
    </header>

    <template lwc:if={error}>
      <p class="error" role="alert">{error}</p>
    </template>

    <template lwc:if={isLoading}>
      <p class="muted">Loading tickets…</p>
    </template>

    <template lwc:if={isNotLoading}>
      <div class="controls">
        <label class="field">
          <span class="label">Status</span>
          <select
            value={selectedStatusFilter}
            onchange={handleStatusFilterChange}
          >
            <template for:each={statusFilterOptions} for:item="opt">
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            </template>
          </select>
        </label>
        <label class="field">
          <span class="label">Type</span>
          <select
            value={selectedRecordTypeFilter}
            onchange={handleRecordTypeFilterChange}
          >
            <template for:each={recordTypeFilterOptions} for:item="opt">
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            </template>
          </select>
        </label>
        <button class="btn btn--ghost" type="button" onclick={handleRefresh}>
          Refresh
        </button>
      </div>

      <p class="count">Showing {ticketCount} ticket{ticketCountLabel}</p>

      <template lwc:if={hasTickets}>
        <table class="grid">
          <thead>
            <tr>
              <th>Case</th>
              <th>Subject</th>
              <th>Type</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Created</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody>
            <template for:each={filteredTickets} for:item="ticket">
              <tr
                key={ticket.Id}
                class="row"
                data-case-id={ticket.Id}
                onclick={handleTicketClick}
              >
                <td data-label="Case">
                  <a class="link">{ticket.CaseNumber}</a>
                </td>
                <td data-label="Subject">{ticket.Subject}</td>
                <td data-label="Type">{ticket.recordTypeName}</td>
                <td data-label="Status">
                  <span class="pill pill--status">{ticket.Status}</span>
                </td>
                <td data-label="Priority">
                  <template lwc:if={ticket.Priority}>
                    <span class="pill pill--priority">{ticket.Priority}</span>
                  </template>
                  <template lwc:else><span class="muted">—</span></template>
                </td>
                <td data-label="Created">{ticket.formattedCreatedDate}</td>
                <td data-label="Updated">{ticket.formattedLastModifiedDate}</td>
              </tr>
            </template>
          </tbody>
        </table>
      </template>

      <template lwc:if={isEmpty}>
        <div class="empty">
          <p class="empty__title">No tickets found</p>
          <template lwc:if={hasAnyTickets}>
            <p class="muted">No tickets match your filters.</p>
          </template>
          <template lwc:else>
            <p class="muted">You haven't submitted any tickets yet.</p>
          </template>
        </div>
      </template>
    </template>
  </section>
</template>

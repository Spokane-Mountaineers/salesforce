<template>
  <section class="tp">
    <div class="tp__head">
      <h3 class="tp__title">
        Participants<template lwc:if={hasParticipants}>
          ({participantCount})</template
        >
      </h3>
      <template lwc:if={canAddParticipant}>
        <button
          class="iconbtn"
          type="button"
          title="Add participant"
          onclick={handleOpenAddModal}
        >
          + Add
        </button>
      </template>
    </div>

    <template lwc:if={isLoading}>
      <p class="muted">Loading participants…</p>
    </template>

    <template lwc:if={isNotLoading}>
      <template lwc:if={hasParticipants}>
        <ul class="plist">
          <template for:each={participants} for:item="participant">
            <li key={participant.Id} class="prow">
              <div class="prow__who">
                <span class="prow__name">{participant.contactName}</span>
                <span class="prow__meta"
                  >Added {participant.formattedAddedDate}</span
                >
              </div>
              <template lwc:if={canAddParticipant}>
                <div class="prow__act">
                  <template lwc:if={participant.isPendingRemove}>
                    <span class="muted">Remove?</span>
                    <button
                      class="btn btn--danger"
                      type="button"
                      data-participant-id={participant.Id}
                      data-contact-name={participant.contactName}
                      onclick={handleConfirmRemove}
                    >
                      Yes
                    </button>
                    <button
                      class="btn btn--ghost"
                      type="button"
                      onclick={handleCancelRemove}
                    >
                      No
                    </button>
                  </template>
                  <template lwc:else>
                    <button
                      class="iconbtn iconbtn--del"
                      type="button"
                      title="Remove participant"
                      data-participant-id={participant.Id}
                      data-contact-name={participant.contactName}
                      onclick={handleRemoveParticipant}
                    >
                      ×
                    </button>
                  </template>
                </div>
              </template>
            </li>
          </template>
        </ul>
      </template>
      <template lwc:else>
        <p class="muted">No additional participants yet.</p>
      </template>
    </template>

    <template lwc:if={error}>
      <p class="error">{error}</p>
    </template>
  </section>

  <template lwc:if={showAddModal}>
    <div
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-label="Add participant"
    >
      <div class="modal__card">
        <header class="modal__head">
          <h2 class="modal__title">Add participant</h2>
          <button class="iconbtn" type="button" onclick={handleCloseAddModal}>
            ×
          </button>
        </header>
        <div class="modal__body">
          <p class="muted">
            Search for a member to add. Participants can view the ticket and add
            comments.
          </p>
          <input
            class="search"
            type="search"
            value={searchTerm}
            onchange={handleSearchChange}
            placeholder="Type at least 2 characters…"
            aria-label="Search by name or email"
          />

          <template lwc:if={isSearching}>
            <p class="muted">Searching…</p>
          </template>

          <template lwc:if={hasSearchResults}>
            <ul class="results">
              <template for:each={searchResults} for:item="contact">
                <li key={contact.Id} class="rrow">
                  <div class="rrow__who">
                    <span class="rrow__name">{contact.Name}</span>
                    <span class="rrow__email">{contact.Email}</span>
                  </div>
                  <button
                    class="btn btn--primary"
                    type="button"
                    data-contact-id={contact.Id}
                    data-contact-name={contact.Name}
                    onclick={handleAddContact}
                    disabled={isAdding}
                  >
                    Add
                  </button>
                </li>
              </template>
            </ul>
          </template>

          <template lwc:if={showNoResults}>
            <p class="muted">No members found matching "{searchTerm}".</p>
          </template>
        </div>
        <footer class="modal__foot">
          <button
            class="btn btn--ghost"
            type="button"
            onclick={handleCloseAddModal}
          >
            Cancel
          </button>
        </footer>
      </div>
    </div>
  </template>
</template>

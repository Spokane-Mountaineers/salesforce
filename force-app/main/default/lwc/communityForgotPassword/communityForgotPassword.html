<template>
  <div class="login" style={rootStyle}>
    <div class="card">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">▲</span>
        <span class="brand__name">Spokane Mountaineers</span>
      </div>

      <template lwc:if={done}>
        <h1 class="heading">Check your email</h1>
        <p class="lead">
          If an account matches that email or username, we’ve sent a link to set
          a new password. It expires shortly — check your spam folder if it
          doesn’t arrive in a few minutes.
        </p>
        <a class="btn btn--primary" href={loginUrl}>Back to sign in</a>
      </template>

      <template lwc:else>
        <form class="form" onsubmit={handleSubmit}>
          <h1 class="heading">{heading}</h1>
          <p class="lead">
            Enter your email or username and we’ll send you a link to set a new
            password.
          </p>

          <template lwc:if={hasError}>
            <p class="error" role="alert">{errorMessage}</p>
          </template>

          <label class="field">
            <span class="label">Email or username</span>
            <input
              type="text"
              value={username}
              onchange={handleChange}
              autocomplete="username"
              required
            />
          </label>

          <button class="btn btn--primary" type="submit" disabled={busy}>
            <template lwc:if={busy}>Sending…</template>
            <template lwc:else>Email me a reset link</template>
          </button>
        </form>
        <a class="forgot" href={loginUrl}>Back to sign in</a>
      </template>
    </div>
  </div>
</template>

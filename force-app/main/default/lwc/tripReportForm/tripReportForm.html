<template>
  <form class="form" onsubmit={handleSubmit}>
    <header class="head">
      <p class="eyebrow">{eyebrowText}</p>
      <h1 class="title">{titleText}</h1>
    </header>

    <template lwc:if={errorMessage}>
      <p class="error" role="alert">{errorMessage}</p>
    </template>

    <label class="field">
      <span class="label">Title</span>
      <input
        type="text"
        data-field="title"
        value={form.title}
        onchange={handleChange}
        maxlength="120"
        required
      />
    </label>

    <div class="row">
      <label class="field">
        <span class="label">Activity</span>
        <select
          data-field="activity"
          onchange={handleChange}
          value={form.activity}
        >
          <option value="">—</option>
          <template for:each={activityOptions} for:item="opt">
            <option key={opt} value={opt}>{opt}</option>
          </template>
        </select>
      </label>
      <label class="field">
        <span class="label">Difficulty</span>
        <select
          data-field="difficulty"
          onchange={handleChange}
          value={form.difficulty}
        >
          <option value="">—</option>
          <template for:each={difficultyOptions} for:item="opt">
            <option key={opt} value={opt}>{opt}</option>
          </template>
        </select>
      </label>
    </div>

    <div class="row">
      <label class="field">
        <span class="label">Trip date</span>
        <input
          type="date"
          data-field="tripDate"
          onchange={handleChange}
          value={form.tripDate}
        />
      </label>
      <label class="field">
        <span class="label">Location / region</span>
        <input
          type="text"
          data-field="location"
          value={form.location}
          onchange={handleChange}
          maxlength="255"
        />
      </label>
    </div>

    <template lwc:if={hasControlledTags}>
      <div class="field">
        <span class="label">Controlled Tags</span>
        <div class="chips" role="group" aria-label="Select controlled tags">
          <template for:each={controlledTags} for:item="tag">
            <button
              key={tag.id}
              class={tag.className}
              data-id={tag.id}
              onclick={handleToggleTag}
              type="button"
            >
              #{tag.name}
            </button>
          </template>
        </div>
      </div>
    </template>

    <label class="field">
      <span class="label">Trip report</span>
      <lightning-input-rich-text
        data-field="body"
        value={form.body}
        onchange={handleChange}
        placeholder="How was the route? Conditions, beta, the good and the type-2 fun…"
      ></lightning-input-rich-text>
    </label>

    <label class="field">
      <span class="label">Free Tags (comma-separated)</span>
      <input
        type="text"
        data-field="freeTags"
        value={form.freeTags}
        onchange={handleChange}
        placeholder="larches, scramble, north cascades"
        maxlength="500"
      />
    </label>

    <template lwc:if={recordId}>
      <div class="field photo-section">
        <span class="label">Photos (Up to 15)</span>
        <div class="photo-upload-zone">
          <input
            type="file"
            multiple
            accept="image/*"
            onchange={handleFileChange}
            disabled={isUploading}
            class="photo-file-input"
            id="photo-file-input"
          />
          <label for="photo-file-input" class="photo-upload-label">
            <span class="upload-icon">📷</span>
            <span class="upload-text">Click or drag photos here to upload</span>
          </label>
        </div>
        <template lwc:if={isUploading}>
          <div class="upload-progress">
            <lightning-spinner
              alternative-text="Uploading photos..."
              size="small"
            ></lightning-spinner>
            <p>Compressing and uploading photos...</p>
          </div>
        </template>

        <template lwc:if={hasPhotos}>
          <div class="photo-grid">
            <template for:each={photos} for:item="photo">
              <div key={photo.id} class="photo-card">
                <div class="photo-preview-wrapper">
                  <img
                    src={photo.memberUrl}
                    alt={photo.altText}
                    class="photo-preview"
                  />
                  <button
                    type="button"
                    class="delete-photo-btn"
                    data-id={photo.id}
                    onclick={handleDeletePhoto}
                    title="Delete Photo"
                  >
                    ×
                  </button>
                </div>
                <div class="photo-metadata-fields">
                  <label class="photo-subfield">
                    <span class="photo-sublabel">Alt Text (Required) *</span>
                    <input
                      type="text"
                      data-id={photo.id}
                      data-field="altText"
                      value={photo.altText}
                      onblur={handlePhotoMetadataBlur}
                      required
                    />
                  </label>
                  <label class="photo-subfield">
                    <span class="photo-sublabel">Caption</span>
                    <input
                      type="text"
                      data-id={photo.id}
                      data-field="caption"
                      value={photo.caption}
                      onblur={handlePhotoMetadataBlur}
                    />
                  </label>
                  <label class="photo-subfield">
                    <span class="photo-sublabel">Credit</span>
                    <input
                      type="text"
                      data-id={photo.id}
                      data-field="credit"
                      value={photo.credit}
                      onblur={handlePhotoMetadataBlur}
                    />
                  </label>
                  <label class="photo-consent">
                    <input
                      type="checkbox"
                      data-id={photo.id}
                      data-field="consentConfirmed"
                      checked={photo.consentConfirmed}
                      onchange={handlePhotoConsentChange}
                    />
                    <span class="consent-text"
                      >I have consent of everyone in this photo *</span
                    >
                  </label>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>
    <template lwc:else>
      <p class="photo-notice">
        Note: You will be able to upload photos after saving your draft.
      </p>
    </template>

    <div class="actions font-body">
      <button
        class="smi-btn smi-btn--primary"
        type="submit"
        disabled={submitting}
      >
        <template lwc:if={submitting}>Saving…</template>
        <template lwc:else>Publish trip report</template>
      </button>

      <button
        class="smi-btn smi-btn--ghost"
        type="button"
        onclick={handleSaveDraft}
        disabled={submitting}
        style="margin-left: 10px"
      >
        Save Draft
      </button>

      <template lwc:if={isDraftEdit}>
        <button
          class="smi-btn smi-btn--danger"
          type="button"
          onclick={handleDeleteDraft}
          disabled={submitting}
          style="margin-left: 10px"
        >
          Delete Draft
        </button>
      </template>

      <button
        class="smi-btn smi-btn--ghost"
        type="button"
        onclick={handleCancel}
        disabled={submitting}
        style="margin-left: 10px"
      >
        Cancel
      </button>
    </div>
  </form>
</template>

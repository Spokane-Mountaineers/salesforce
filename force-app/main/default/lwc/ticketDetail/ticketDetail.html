<template>
  <section class="td">
    <template lwc:if={isLoading}>
      <p class="muted">Loading ticket…</p>
    </template>

    <template lwc:if={error}>
      <p class="error" role="alert">{error}</p>
      <button class="btn btn--ghost" type="button" onclick={handleBack}>
        Back to My Tickets
      </button>
    </template>

    <template lwc:if={hasCaseId}>
      <template lwc:if={ticket}>
        <div class="actionbar">
          <button class="btn btn--ghost" type="button" onclick={handleBack}>
            ‹ Back
          </button>
          <button class="btn btn--ghost" type="button" onclick={handleRefresh}>
            Refresh
          </button>
          <template lwc:if={isTicketClosed}>
            <button
              class="btn btn--primary"
              type="button"
              onclick={handleReopenTicket}
              disabled={isReopening}
            >
              Reopen ticket
            </button>
          </template>
        </div>

        <header class="td__head">
          <p class="eyebrow">Ticket {ticket.CaseNumber}</p>
          <h1 class="title">{ticket.Subject}</h1>
          <div class="badges">
            <span class="pill pill--status">{ticket.Status}</span>
            <template lwc:if={ticket.Priority}>
              <span class="pill pill--priority">{ticket.Priority}</span>
            </template>
          </div>
        </header>

        <dl class="facts">
          <div class="fact">
            <dt>Type</dt>
            <dd>{ticket.recordTypeName}</dd>
          </div>
          <div class="fact">
            <dt>Created</dt>
            <dd>{ticket.formattedCreatedDate}</dd>
          </div>
          <div class="fact">
            <dt>Updated</dt>
            <dd>{ticket.formattedLastModifiedDate}</dd>
          </div>
          <template lwc:if={ticket.Owner}>
            <div class="fact">
              <dt>Assigned to</dt>
              <dd>{ticket.ownerName}</dd>
            </div>
          </template>
        </dl>

        <div class="panel">
          <h2 class="panel__title">Description</h2>
          <p class="longform">{ticket.Description}</p>
        </div>

        <c-ticket-participants
          case-id={resolvedCaseId}
          is-opener={isOpener}
          onparticipantadded={handleParticipantChange}
          onparticipantremoved={handleParticipantChange}
        ></c-ticket-participants>

        <div class="panel">
          <h2 class="panel__title">Attachments</h2>
          <template lwc:if={isTicketOpen}>
            <lightning-file-upload
              label="Attach files"
              name="fileUploader"
              accept={acceptedFormats}
              record-id={resolvedCaseId}
              onuploadfinished={handleFileUpload}
              multiple
            ></lightning-file-upload>
          </template>
          <template lwc:if={hasFiles}>
            <ul class="files">
              <template for:each={files} for:item="file">
                <li key={file.Id} class="frow">
                  <a
                    href={file.downloadUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                    >{file.Title}</a
                  >
                  <span class="frow__date">{file.formattedDate}</span>
                </li>
              </template>
            </ul>
          </template>
          <template lwc:else>
            <p class="muted">No attachments yet.</p>
          </template>
        </div>

        <div class="panel">
          <h2 class="panel__title">Comments ({commentCount})</h2>
          <template lwc:if={hasComments}>
            <ul class="comments">
              <template for:each={comments} for:item="comment">
                <li key={comment.Id} class="comment">
                  <div class="comment__head">
                    <span class="comment__author">{comment.createdByName}</span>
                    <span class="comment__when"
                      >{comment.formattedCreatedDate}</span
                    >
                  </div>
                  <p class="comment__body">{comment.CommentBody}</p>
                </li>
              </template>
            </ul>
          </template>
          <template lwc:else>
            <p class="muted">No comments yet.</p>
          </template>
        </div>

        <template lwc:if={isTicketOpen}>
          <div class="panel">
            <h2 class="panel__title">Add a comment</h2>
            <textarea
              class="composer"
              rows="4"
              value={newComment}
              onchange={handleCommentChange}
              placeholder="Enter your comment…"
            ></textarea>
            <div class="composer__actions">
              <button
                class="btn btn--primary"
                type="button"
                onclick={handleAddComment}
                disabled={isAddCommentDisabled}
              >
                <template lwc:if={isAddingComment}>Adding…</template>
                <template lwc:else>Add comment</template>
              </button>
            </div>
          </div>
        </template>

        <template lwc:if={isTicketClosed}>
          <p class="notice">
            This ticket is {ticket.Status}. Use "Reopen ticket" above if you
            need further assistance.
          </p>
        </template>
      </template>
    </template>
  </section>
</template>

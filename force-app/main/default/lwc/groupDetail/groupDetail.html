<template>
  <template lwc:if={isGuest}>
    <c-login-gate
      heading="Sign in to view this group"
      message="Activity groups, their events, and discussion are for members. Please sign in to continue."
    ></c-login-gate>
  </template>
  <article lwc:else class="root">
    <template lwc:if={errorMessage}>
      <p class="state state--error">{errorMessage}</p>
    </template>

    <template lwc:if={hasGroup}>
      <header class="head">
        <a class="back" href={backUrl}>← All activity groups</a>
        <p class="eyebrow">{typeLabel}</p>
        <h1 class="title">{group.name}</h1>
        <p class="meta">{memberLabel}</p>
        <template lwc:if={group.description}>
          <p class="desc">{group.description}</p>
        </template>

        <div class="membership">
          <template lwc:if={showJoin}>
            <button
              class="btn btn--primary"
              onclick={handleJoin}
              disabled={busy}
            >
              {joinLabel}
            </button>
          </template>
          <template lwc:if={showPending}>
            <span class="pending">Request pending approval</span>
          </template>
          <template lwc:if={isMember}>
            <label class="freq">
              <span class="freq__label">Email notifications</span>
              <select class="freq__select" onchange={handleFrequencyChange}>
                <template for:each={frequencyOptions} for:item="f">
                  <option key={f.value} value={f.value} selected={f.selected}>
                    {f.label}
                  </option>
                </template>
              </select>
            </label>
            <button
              class="btn btn--ghost"
              onclick={handleLeave}
              disabled={busy}
            >
              Leave group
            </button>
          </template>
        </div>
      </header>

      <template lwc:if={group.isAdmin}>
        <c-group-admin-panel
          group-id={group.id}
          description={group.description}
        ></c-group-admin-panel>
      </template>

      <section class="events">
        <h2 class="events__title">Upcoming events</h2>
        <c-events-calendar activity={group.name}></c-events-calendar>
      </section>

      <section class="feed">
        <c-smi-feed
          group-id={group.id}
          heading="Group feed"
          read-only={notMember}
        ></c-smi-feed>
      </section>
    </template>
  </article>
</template>

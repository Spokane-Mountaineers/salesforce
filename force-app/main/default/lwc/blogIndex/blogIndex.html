<template>
  <section class="blog">
    <header class="head">
      <p class="eyebrow">Field Notes</p>
      <h1 class="title">Trip Reports &amp; Club News</h1>
    </header>

    <div class="controls">
      <input
        type="search"
        class="search-box"
        placeholder="Search posts…"
        onchange={handleSearch}
        aria-label="Search posts"
      />
      <div class="chips" role="group" aria-label="Filter by activity">
        <template for:each={activityChips} for:item="c">
          <button
            key={c.value}
            class={c.cls}
            data-value={c.value}
            onclick={handleActivity}
            type="button"
          >
            {c.label}
          </button>
        </template>
      </div>
      <template lwc:if={tagChips.length}>
        <div class="chips" role="group" aria-label="Filter by tag">
          <template for:each={tagChips} for:item="c">
            <button
              key={c.value}
              class={c.cls}
              data-value={c.value}
              onclick={handleTag}
              type="button"
            >
              #{c.label}
            </button>
          </template>
        </div>
      </template>
    </div>

    <template lwc:if={postsError}>
      <p class="state state--error">{postsError}</p>
    </template>

    <template lwc:if={isEmpty}>
      <p class="state">
        No posts match those filters yet.
        <button class="link" type="button" onclick={clearFilters}>
          Clear filters
        </button>
      </p>
    </template>

    <template lwc:if={hasPosts}>
      <a class="lead" href={leadPost.detailUrl}>
        <div class="lead__plate">
          <svg
            class="lead__contour"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <pattern
                id="topo-lead"
                width="420"
                height="420"
                patternUnits="userSpaceOnUse"
              >
                <g
                  fill="none"
                  stroke="#1e4b38"
                  stroke-opacity="0.05"
                  stroke-width="1.5"
                >
                  <path d="M-20 120 C 90 60 170 180 280 120 S 460 60 540 140" />
                  <path
                    d="M-20 170 C 90 110 170 230 280 170 S 460 110 540 190"
                  />
                  <path
                    d="M-20 220 C 90 160 170 280 280 220 S 460 160 540 240"
                  />
                  <path
                    d="M-20 270 C 90 210 170 330 280 270 S 460 210 540 290"
                  />
                  <path
                    d="M-20 320 C 90 260 170 380 280 320 S 460 260 540 340"
                  />
                </g>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#topo-lead)" />
          </svg>
          <span class="lead__tag">Latest</span>
        </div>
        <div class="lead__body">
          <p class="lead__meta">{leadPost.meta}</p>
          <h2 class="lead__title">{leadPost.title}</h2>
          <p class="lead__byline">by {leadPost.authorName}</p>
        </div>
      </a>

      <template lwc:if={hasRest}>
        <ul class="ledger">
          <template for:each={restPosts} for:item="p">
            <li key={p.id} class="row">
              <a class="row__link" href={p.detailUrl}>
                <span class="row__meta">{p.meta}</span>
                <span class="row__title">{p.title}</span>
                <span class="row__byline">{p.authorName}</span>
              </a>
            </li>
          </template>
        </ul>
      </template>
    </template>
  </section>
</template>

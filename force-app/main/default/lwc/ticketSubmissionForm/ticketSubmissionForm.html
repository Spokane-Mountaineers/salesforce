<template>
  <section class="tk">
    <header class="tk__head">
      <p class="eyebrow">Support</p>
      <h1 class="title">Submit a Ticket</h1>
    </header>

    <template lwc:if={error}>
      <p class="error" role="alert">{error}</p>
    </template>

    <template lwc:if={isFormVisible}>
      <div class="form">
        <label class="field">
          <span class="label">Ticket type</span>
          <select onchange={handleRecordTypeChange} value={selectedRecordType}>
            <option value="">Select a ticket type…</option>
            <template for:each={recordTypeOptions} for:item="opt">
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            </template>
          </select>
        </label>

        <label class="field">
          <span class="label">Subject</span>
          <input
            type="text"
            maxlength="255"
            value={subject}
            onchange={handleSubjectChange}
          />
          <span class="hint">Maximum 255 characters</span>
        </label>

        <label class="field">
          <span class="label">Description</span>
          <textarea
            rows="6"
            value={description}
            onchange={handleDescriptionChange}
          ></textarea>
          <span class="hint">
            Minimum 10 characters — you've entered {descriptionLength}.
          </span>
        </label>

        <label class="field">
          <span class="label">Priority (optional)</span>
          <select onchange={handlePriorityChange} value={selectedPriority}>
            <option value="">Select priority…</option>
            <template for:each={priorityOptions} for:item="opt">
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            </template>
          </select>
        </label>

        <div class="actions">
          <button
            class="btn btn--primary"
            type="button"
            onclick={handleSubmit}
            disabled={isFormDisabled}
          >
            <template lwc:if={isLoading}>Submitting…</template>
            <template lwc:else>Submit ticket</template>
          </button>
          <button
            class="btn btn--ghost"
            type="button"
            onclick={handleCancel}
            disabled={isLoading}
          >
            Cancel
          </button>
        </div>
      </div>
    </template>

    <template lwc:else>
      <div class="intro">
        <p class="intro__lead">Need help or have feedback?</p>
        <p class="intro__sub">
          Submit a ticket and our team will get back to you.
        </p>
        <button class="btn btn--primary" type="button" onclick={handleShowForm}>
          Submit a new ticket
        </button>
      </div>
    </template>
  </section>
</template>
